<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Dodge Mint</title>
    <link rel="preload" as="image" href="./assets/IMG_1218.png" fetchpriority="high" />
    <link rel="preload" as="image" href="./assets/IMG_1219.png" />
    <link rel="preload" as="image" href="./assets/IMG_1227.png" />
    <link rel="stylesheet" href="./style.css?v=20260623-1" />
    <link rel="stylesheet" href="./player.css?v=20260621-9" />
    <link rel="stylesheet" href="./obstacle.css?v=20260701-4" />
  </head>
  <body>
    <main class="shell">
      <header class="hud">
        <div class="hud-card">
          <span class="hud-label">SCORE</span>
          <strong id="score">0</strong>
        </div>
        <div class="hud-card">
          <span class="hud-label">BEST</span>
          <strong id="high-score">0</strong>
        </div>
      </header>

      <section class="arena-wrap">
        <div id="arena" class="arena" aria-label="Game arena">
          <div id="player" class="player"></div>
          <div id="obstacles" class="obstacles"></div>

          <div id="overlay" class="overlay">
            <div class="overlay-card">
              <p class="eyebrow">HOLD TO DODGE</p>
              <h1 id="overlay-title">DODGE MINT</h1>
              <p id="overlay-body" class="overlay-body">
                좌우를 누르고 살아남으세요.
              </p>
              <dl class="overlay-stats">
                <div>
                  <dt>현재 점수</dt>
                  <dd id="final-score">0</dd>
                </div>
                <div>
                  <dt>최고 기록</dt>
                  <dd id="final-high-score">0</dd>
                </div>
              </dl>
              <p id="best-badge" class="best-badge best-badge-hidden">NEW BEST</p>
              <button id="start-button" class="start-button" type="button">PLAY</button>
            </div>
          </div>
        </div>
      </section>

      <section class="controls" aria-label="Move controls">
        <button id="left-button" class="control-button" type="button" aria-label="Move left">
          LEFT
        </button>
        <button id="right-button" class="control-button" type="button" aria-label="Move right">
          RIGHT
        </button>
      </section>
    </main>

    <script src="./game.js?v=20260622-2"></script>
  </body>
</html>
